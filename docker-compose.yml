services:
  mallorca-pizza:
    build:
      context: .
    image: mallorca-pizza:local
    restart: unless-stopped
    environment:
      BIND_HOST: 0.0.0.0
      ENVIRONMENT: production
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:?Set the trusted Traefik IP or network}
      PORT: "8000"
      RESTAURANTS_ROOT: /app/restaurants
      STATIC_ROOT: /app/static
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:' + os.environ.get('PORT', '8000') + '/health/ready', timeout=2).read()"
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - traefik

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}
