name: Verify

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  verify:
    name: Quality, tests, validation and Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Check formatting
        run: uv run ruff format --check

      - name: Lint
        run: uv run ruff check

      - name: Type check
        run: uv run mypy

      - name: Test
        run: uv run pytest

      - name: Validate configuration and assets
        run: uv run mallorca-pizza-validate-config

      - name: Build Docker image
        run: docker build -t mallorca-pizza:${{ github.sha }} .
